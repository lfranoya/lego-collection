<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="LEGO"/>
  <meta name="theme-color" content="#0a0a0f"/>
  <title>LEGO Collection v1.0</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --red:#e3000b; --yellow:#FFD700; --green:#7ec850;
      --bg:#0a0a0f; --card:#13131f; --border:#1e1e2e;
      --text:#f0ede6; --muted:#666; --nav-h:64px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;
      min-height:100vh;min-height:-webkit-fill-available;overscroll-behavior:none}

    /* ── NAV ── */
    .nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);
      background:rgba(10,10,15,0.97);backdrop-filter:blur(16px);
      border-top:1px solid var(--border);display:flex;z-index:100;
      padding-bottom:env(safe-area-inset-bottom)}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;
      justify-content:center;gap:4px;border:none;background:none;color:var(--muted);
      font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;cursor:pointer;
      transition:color .2s;padding-bottom:4px}
    .nav-btn.active{color:var(--yellow)}
    .nav-btn svg{width:22px;height:22px}

    /* ── PAGES ── */
    .page{display:none;padding-bottom:calc(var(--nav-h) + 16px);min-height:100vh}
    .page.active{display:block}

    /* ── HEADER ── */
    .header{background:linear-gradient(160deg,#111122 0%,#0a0a0f 100%);
      padding:52px 20px 18px;border-bottom:2px solid var(--red);
      position:sticky;top:0;z-index:50}
    .header-top{display:flex;align-items:center;gap:12px;margin-bottom:4px}
    .logo{width:40px;height:40px;background:var(--red);border-radius:10px;
      display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
    .title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;line-height:1}
    .subtitle{font-size:12px;color:var(--muted);margin-top:2px}

    /* ── LOADING / ERROR ── */
    .loading{display:flex;flex-direction:column;align-items:center;
      justify-content:center;padding:80px 20px;gap:14px;color:var(--muted);font-size:14px}
    .spinner{width:36px;height:36px;border:3px solid var(--border);
      border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .error-box{margin:20px;padding:16px;background:#1a0a0a;
      border:1px solid #e3000b44;border-radius:10px;font-size:13px;
      color:#e07070;line-height:1.6}
    .retry-btn{margin-top:12px;padding:8px 18px;background:var(--red);color:#fff;
      border:none;border-radius:6px;font-family:'DM Sans',sans-serif;
      font-size:13px;cursor:pointer}

    /* ── DASHBOARD ── */
    .dash-content{padding:16px}

    .kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
    .kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;
      padding:14px;position:relative;overflow:hidden}
    .kpi.wide{grid-column:1/-1}
    .kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent,var(--red))}
    .kpi-val{font-family:'Bebas Neue',sans-serif;font-size:38px;line-height:1}
    .kpi-val.sm{font-size:26px}
    .kpi-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
    .kpi-sub{font-size:11px;color:var(--muted);margin-top:2px}

    .prog-wrap{margin-top:10px}
    .prog-header{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:5px}
    .prog-header span:last-child{color:var(--yellow);font-weight:600}
    .prog-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
    .prog-fill{height:100%;background:var(--yellow);border-radius:3px}
    .prog-footer{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:4px}

    .sec-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1.5px;
      color:var(--muted);margin:20px 0 10px;text-transform:uppercase}

    /* ── TABLES ── */
    .tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;
      overflow:hidden;margin-bottom:16px}
    table{width:100%;border-collapse:collapse;font-size:12px}
    thead tr{background:#0d0d1a}
    th{padding:9px 10px;text-align:right;font-size:10px;font-weight:600;
      color:var(--muted);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
    th:first-child{text-align:left}
    td{padding:8px 10px;text-align:right;border-top:1px solid var(--border);
      color:var(--text);white-space:nowrap}
    td:first-child{text-align:left;font-weight:500}
    tr.total-row td{background:#0d0d1a;font-weight:700;color:var(--yellow)}
    .dot{display:inline-block;width:8px;height:8px;border-radius:50%;
      margin-right:6px;flex-shrink:0;vertical-align:middle}
    .pct-cell{color:var(--green)}

    /* ── MATRIX TABLE ── */
    .matrix-grid{display:grid;grid-template-columns:auto 1fr 1fr 1fr;gap:0}
    .mx{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
    .mx table th,.mx table td{font-size:12px;padding:9px 12px}
    .mx table th{text-align:center}
    .mx table td{text-align:center}
    .mx table td:first-child{text-align:left}

    /* ── RETIREMENT TABLE ── */
    .retire-tbl td:first-child{color:var(--muted);font-weight:400}

    /* ── SEARCH ── */
    .srch-header{padding:52px 20px 14px;
      background:linear-gradient(160deg,#111122 0%,#0a0a0f 100%);
      border-bottom:2px solid var(--red);position:sticky;top:0;z-index:50}
    .srch-input{width:100%;padding:12px 16px;border-radius:10px;
      border:1.5px solid var(--border);background:#0d0d18;color:var(--text);
      font-size:16px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:10px}
    .srch-input:focus{border-color:var(--red)}
    .filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px}
    .filters::-webkit-scrollbar{display:none}
    select{background:#0d0d18;color:var(--text);border:1.5px solid var(--border);
      border-radius:8px;padding:8px 10px;font-size:13px;
      font-family:'DM Sans',sans-serif;outline:none;flex-shrink:0}
    .result-count{padding:10px 16px 4px;font-size:12px;color:var(--muted)}
    .sets-list{padding:4px 14px 0}

    .set-card{background:var(--card);border:1px solid var(--border);
      border-left:3px solid var(--tc,#888);border-radius:10px;
      padding:13px 14px;margin-bottom:10px}
    .set-meta{font-size:11px;color:var(--muted);margin-bottom:2px}
    .set-name{font-size:15px;font-weight:600;margin-bottom:8px;line-height:1.3}
    .set-footer{display:flex;justify-content:space-between;align-items:flex-end}
    .badges{display:flex;gap:5px;flex-wrap:wrap}
    .badge{padding:3px 7px;border-radius:5px;font-size:11px;font-weight:500;border:1px solid transparent}
    .b-theme{background:color-mix(in srgb,var(--tc) 15%,transparent);
      border-color:color-mix(in srgb,var(--tc) 40%,transparent);color:var(--tc)}
    .b-built{background:#1a3a1a;border-color:#7ec85055;color:#7ec850}
    .b-unbuilt{background:#1a1a1a;border-color:#33333355;color:#555}
    .b-active{background:#1a2a1a;border-color:#70b07044;color:#70b070}
    .b-retired{background:#2a1a1a;border-color:#e0707044;color:#e07070}
    .pieces{text-align:right;flex-shrink:0;margin-left:10px}
    .pieces-num{font-family:'Bebas Neue',sans-serif;font-size:24px;line-height:1}
    .pieces-lbl{font-size:10px;color:var(--muted)}
    .empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}
  </style>
</head>
<body>

<!-- DASHBOARD -->
<div class="page active" id="page-dash">
  <div class="header">
    <div class="header-top">
      <div class="logo">🧱</div>
      <div>
        <div class="title">LEGO Collection</div>
        <div class="subtitle" id="dash-subtitle">Loading… <span style="opacity:0.4;font-size:10px">v1.0</span></div>
      </div>
    </div>
  </div>
  <div id="dash-body">
    <div class="loading"><div class="spinner"></div>Fetching your collection…</div>
  </div>
</div>

<!-- SEARCH -->
<div class="page" id="page-search">
  <div class="srch-header">
    <div class="header-top" style="margin-bottom:14px">
      <div class="logo">🔍</div>
      <div>
        <div class="title">Find a Set</div>
        <div class="subtitle" id="srch-subtitle">—</div>
      </div>
    </div>
    <input class="srch-input" id="srch-input" type="search" placeholder="Name or set number…"/>
    <div class="filters">
      <select id="f-theme"><option value="">All Themes</option></select>
      <select id="f-built">
        <option value="">Built?</option>
        <option value="YES">Built</option>
        <option value="NO">Not Built</option>
      </select>
      <select id="f-retired">
        <option value="">Status</option>
        <option value="Not Retired">Active</option>
        <option value="Retired">Retired</option>
      </select>
    </div>
  </div>
  <div class="result-count" id="result-count"></div>
  <div class="sets-list" id="sets-list">
    <div class="loading"><div class="spinner"></div>Loading…</div>
  </div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" id="nav-dash" onclick="switchPage('dash')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
      <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
    </svg>Dashboard
  </button>
  <button class="nav-btn" id="nav-search" onclick="switchPage('search')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>Search
  </button>
</nav>

<script>
// ── IMPORTANT: Replace this URL after you deploy the Apps Script ──
// It should look like: https://script.google.com/macros/s/XXXX/exec
const API_URL = 'https://script.google.com/macros/s/AKfycbxHKIQ_n5OG-UN9xLaz186KtOPOMyfE085aZg4R9s2h4_NJ0OwD-gHYbMCG23iEfUpk/exec';

const THEME_COLORS = {
  "Star Wars":"#FFE81F","Architecture":"#A8D5E2","Icons":"#F4A460",
  "Ideas":"#98D8C8","Super Mario":"#E8402A","Speed Champions":"#E63946",
  "Marvel":"#FF3A3A","Technic":"#CC0000","Botanical Collection":"#7EC850",
  "Creator":"#4ECDC4","Creator Expert":"#2E86AB","Jurassic World":"#5C8A3C",
  "Pokemon":"#FFCB05","Disney":"#1B6CA8","Harry Potter":"#C7A84F",
  "DC":"#0476D0","Editions":"#9B5DE5","Other":"#888888"
};

let allSets = [];
let loaded = false;

// ── FETCH ──────────────────────────────────────────────────────
async function loadData() {
  try {
    const resp = await fetch(API_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    allSets = data.sets;
    loaded = true;

    const ts = new Date(data.fetchedAt);
    const timeStr = ts.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    document.getElementById('dash-subtitle').textContent = `${allSets.length} sets · synced ${timeStr}`;
    document.getElementById('srch-subtitle').textContent = `${allSets.length} sets`;

    renderDashboard();
    initSearch();
  } catch(e) {
    const html = `<div class="error-box">
      ⚠️ Could not load data.<br><br>${e.message}<br><br>
      Make sure the Apps Script is deployed and the URL is set in index.html.
      <br><button class="retry-btn" onclick="loadData()">Retry</button>
    </div>`;
    document.getElementById('dash-body').innerHTML = html;
    document.getElementById('sets-list').innerHTML = html;
    document.getElementById('dash-subtitle').textContent = 'Failed to load';
  }
}

// ── HELPERS ────────────────────────────────────────────────────
const fmt = n => Number(n).toLocaleString();
const pct = (a,b) => b ? Math.round(a/b*100)+'%' : '0%';
const tc  = t => THEME_COLORS[t] || '#888';

// ── DASHBOARD ──────────────────────────────────────────────────
function renderDashboard() {
  const total      = allSets.length;
  const built      = allSets.filter(s=>s.built==='YES').length;
  const unbuilt    = total - built;
  const active     = allSets.filter(s=>s.retired==='Not Retired').length;
  const retired    = total - active;
  const totalBrick = allSets.reduce((a,s)=>a+s.pieces,0);
  const builtBrick = allSets.filter(s=>s.built==='YES').reduce((a,s)=>a+s.pieces,0);
  const unbuiltBrk = totalBrick - builtBrick;
  const activeBrk  = allSets.filter(s=>s.retired==='Not Retired').reduce((a,s)=>a+s.pieces,0);
  const retiredBrk = totalBrick - activeBrk;
  const builtPct   = Math.round(built/total*100);
  const brickPct   = Math.round(builtBrick/totalBrick*100);

  // Theme breakdown
  const themeMap = {};
  for(const s of allSets){
    if(!themeMap[s.theme]) themeMap[s.theme]={sets:0,built:0,bricks:0,builtBricks:0,activeSets:0,activeBricks:0,retiredSets:0,retiredBricks:0};
    const t = themeMap[s.theme];
    t.sets++; t.bricks+=s.pieces;
    if(s.built==='YES'){t.built++;t.builtBricks+=s.pieces}
    if(s.retired==='Not Retired'){t.activeSets++;t.activeBricks+=s.pieces}
    else{t.retiredSets++;t.retiredBricks+=s.pieces}
  }
  const themes = Object.entries(themeMap).sort((a,b)=>b[1].sets-a[1].sets);

  // Retirement by year
  const yearMap = {};
  for(const s of allSets){
    const yr = (s.yearRetired && s.yearRetired!=='-') ? s.yearRetired : '2027+';
    if(!yearMap[yr]){yearMap[yr]={sets:0,bricks:0}}
    yearMap[yr].sets++; yearMap[yr].bricks+=s.pieces;
  }
  const years = Object.entries(yearMap).sort((a,b)=>{
    const av = a[0]==='2027+'?9999:parseInt(a[0]);
    const bv = b[0]==='2027+'?9999:parseInt(b[0]);
    return av-bv;
  });
  const totalYrSets  = years.reduce((a,r)=>a+r[1].sets,0);
  const totalYrBrick = years.reduce((a,r)=>a+r[1].bricks,0);

  // Matrix
  const mx = {
    toBuildActive:0,  toBuildActiveBrk:0,
    toBuildRetired:0, toBuildRetiredBrk:0,
    builtActive:0,    builtActiveBrk:0,
    builtRetired:0,   builtRetiredBrk:0,
  };
  for(const s of allSets){
    const isBuilt  = s.built==='YES';
    const isActive = s.retired==='Not Retired';
    if(!isBuilt && isActive) {mx.toBuildActive++;  mx.toBuildActiveBrk+=s.pieces}
    if(!isBuilt && !isActive){mx.toBuildRetired++; mx.toBuildRetiredBrk+=s.pieces}
    if(isBuilt  && isActive) {mx.builtActive++;    mx.builtActiveBrk+=s.pieces}
    if(isBuilt  && !isActive){mx.builtRetired++;   mx.builtRetiredBrk+=s.pieces}
  }

  document.getElementById('dash-body').innerHTML = `
<div class="dash-content">

  <!-- KPI strip -->
  <div class="kpi-grid">
    <div class="kpi wide" style="--accent:#e3000b">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><div class="kpi-val">${total}</div><div class="kpi-lbl">Total Sets</div></div>
        <div style="text-align:right"><div class="kpi-val sm">${fmt(totalBrick)}</div><div class="kpi-lbl">Total Bricks</div></div>
      </div>
      <div class="prog-wrap">
        <div class="prog-header"><span>Build Progress</span><span>${builtPct}% built</span></div>
        <div class="prog-bar"><div class="prog-fill" style="width:${builtPct}%"></div></div>
        <div class="prog-footer"><span>${built} built</span><span>${unbuilt} to build</span></div>
      </div>
    </div>
    <div class="kpi" style="--accent:#7ec850">
      <div class="kpi-val sm">${built}</div><div class="kpi-lbl">Built</div>
      <div class="kpi-sub">${fmt(builtBrick)} bricks</div>
    </div>
    <div class="kpi" style="--accent:#e07070">
      <div class="kpi-val sm">${unbuilt}</div><div class="kpi-lbl">To Build</div>
      <div class="kpi-sub">${fmt(unbuiltBrk)} bricks</div>
    </div>
    <div class="kpi" style="--accent:#70b070">
      <div class="kpi-val sm">${active}</div><div class="kpi-lbl">Not Retired</div>
      <div class="kpi-sub">${fmt(activeBrk)} bricks</div>
    </div>
    <div class="kpi" style="--accent:#e07070">
      <div class="kpi-val sm">${retired}</div><div class="kpi-lbl">Retired</div>
      <div class="kpi-sub">${fmt(retiredBrk)} bricks</div>
    </div>
  </div>

  <!-- Build progress by theme -->
  <div class="sec-title">Build Progress by Theme</div>
  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th>Theme</th>
          <th>Blt</th><th>Blt Brk</th>
          <th>ToBld</th><th>ToBld Brk</th>
          <th>Tot</th><th>Tot Brk</th>
          <th>%Sets</th><th>%Brk</th>
          <th>Act</th><th>Act Brk</th>
          <th>Ret</th><th>Ret Brk</th>
        </tr>
      </thead>
      <tbody>
        ${themes.map(([theme,d])=>`
        <tr>
          <td><span class="dot" style="background:${tc(theme)}"></span>${theme}</td>
          <td>${d.built}</td><td>${fmt(d.builtBricks)}</td>
          <td>${d.sets-d.built}</td><td>${fmt(d.bricks-d.builtBricks)}</td>
          <td>${d.sets}</td><td>${fmt(d.bricks)}</td>
          <td class="pct-cell">${pct(d.built,d.sets)}</td>
          <td class="pct-cell">${pct(d.builtBricks,d.bricks)}</td>
          <td>${d.activeSets}</td><td>${fmt(d.activeBricks)}</td>
          <td>${d.retiredSets}</td><td>${fmt(d.retiredBricks)}</td>
        </tr>`).join('')}
        <tr class="total-row">
          <td>TOTAL</td>
          <td>${built}</td><td>${fmt(builtBrick)}</td>
          <td>${unbuilt}</td><td>${fmt(unbuiltBrk)}</td>
          <td>${total}</td><td>${fmt(totalBrick)}</td>
          <td class="pct-cell">${pct(built,total)}</td>
          <td class="pct-cell">${pct(builtBrick,totalBrick)}</td>
          <td>${active}</td><td>${fmt(activeBrk)}</td>
          <td>${retired}</td><td>${fmt(retiredBrk)}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Collection Overview Matrix -->
  <div class="sec-title">Collection Overview</div>
  <div class="mx">
    <table>
      <thead>
        <tr>
          <th></th>
          <th>Not Retired</th>
          <th>Retired</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>To Build</td>
          <td>${mx.toBuildActive}<br><small style="color:var(--muted)">${fmt(mx.toBuildActiveBrk)}</small></td>
          <td>${mx.toBuildRetired}<br><small style="color:var(--muted)">${fmt(mx.toBuildRetiredBrk)}</small></td>
          <td>${mx.toBuildActive+mx.toBuildRetired}<br><small style="color:var(--muted)">${fmt(mx.toBuildActiveBrk+mx.toBuildRetiredBrk)}</small></td>
        </tr>
        <tr>
          <td>Built</td>
          <td>${mx.builtActive}<br><small style="color:var(--muted)">${fmt(mx.builtActiveBrk)}</small></td>
          <td>${mx.builtRetired}<br><small style="color:var(--muted)">${fmt(mx.builtRetiredBrk)}</small></td>
          <td>${mx.builtActive+mx.builtRetired}<br><small style="color:var(--muted)">${fmt(mx.builtActiveBrk+mx.builtRetiredBrk)}</small></td>
        </tr>
        <tr class="total-row">
          <td>Total</td>
          <td>${active}<br><small>${fmt(activeBrk)}</small></td>
          <td>${retired}<br><small>${fmt(retiredBrk)}</small></td>
          <td>${total}<br><small>${fmt(totalBrick)}</small></td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Retirement by year -->
  <div class="sec-title">Retirement Timeline</div>
  <div class="tbl-wrap retire-tbl">
    <table>
      <thead><tr><th>Year</th><th>Sets</th><th>Bricks</th></tr></thead>
      <tbody>
        ${years.map(([yr,d])=>`
        <tr><td>${yr}</td><td>${d.sets}</td><td>${fmt(d.bricks)}</td></tr>
        `).join('')}
        <tr class="total-row">
          <td>TOTAL</td><td>${totalYrSets}</td><td>${fmt(totalYrBrick)}</td>
        </tr>
      </tbody>
    </table>
  </div>

</div>`;
}

// ── SEARCH ──────────────────────────────────────────────────────
function initSearch() {
  const themes = [...new Set(allSets.map(s=>s.theme))].sort();
  const sel = document.getElementById('f-theme');
  sel.innerHTML = '<option value="">All Themes</option>' +
    themes.map(t=>`<option value="${t}">${t}</option>`).join('');
  filterSets();
}

function filterSets() {
  if(!loaded) return;
  const q = document.getElementById('srch-input').value.trim().toLowerCase();
  const th = document.getElementById('f-theme').value;
  const bu = document.getElementById('f-built').value;
  const re = document.getElementById('f-retired').value;

  const res = allSets.filter(s=>{
    const mq = !q||s.num.includes(q)||s.name.toLowerCase().includes(q)||s.theme.toLowerCase().includes(q);
    return mq && (!th||s.theme===th) && (!bu||s.built===bu) && (!re||s.retired===re);
  });

  document.getElementById('result-count').textContent =
    res.length===allSets.length ? `All ${allSets.length} sets` : `${res.length} of ${allSets.length} sets`;

  document.getElementById('sets-list').innerHTML = res.length===0
    ? '<div class="empty">No sets found</div>'
    : res.map(s=>{
        const color = tc(s.theme);
        return `<div class="set-card" style="--tc:${color}">
          <div class="set-meta">#${s.num} · ${s.yearReleased}</div>
          <div class="set-name">${s.name}</div>
          <div class="set-footer">
            <div class="badges">
              <span class="badge b-theme" style="--tc:${color}">${s.theme}</span>
              <span class="badge ${s.built==='YES'?'b-built':'b-unbuilt'}">${s.built==='YES'?'✓ Built':'○ Unbuilt'}</span>
              <span class="badge ${s.retired==='Not Retired'?'b-active':'b-retired'}">${s.retired}</span>
            </div>
            <div class="pieces">
              <div class="pieces-num">${s.pieces.toLocaleString()}</div>
              <div class="pieces-lbl">pieces</div>
            </div>
          </div>
        </div>`;
      }).join('');
}

// ── NAV ────────────────────────────────────────────────────────
function switchPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
}

// ── EVENTS ─────────────────────────────────────────────────────
document.getElementById('srch-input').addEventListener('input',filterSets);
document.getElementById('f-theme').addEventListener('change',filterSets);
document.getElementById('f-built').addEventListener('change',filterSets);
document.getElementById('f-retired').addEventListener('change',filterSets);

loadData();
</script>
